spring:
  application:
    name: orbit-platform

  # ── Database ──────────────────────────────────────────────────────────────
  # On Render: set DATABASE_URL as a single connection string (Render's format)
  # OR set individual DB_HOST / DB_NAME / DB_USERNAME / DB_PASSWORD env vars
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:orbit}}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: OrbitPool
      # FIX: Render free Postgres allows max 10 connections.
      # Starter plan: 25. Scale this up when upgrading your Render plan.
      minimum-idle: 2
      maximum-pool-size: ${DB_POOL_SIZE:5}
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 600000
      leak-detection-threshold: 30000
      connection-test-query: SELECT 1
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 100
        prepStmtCacheSqlLimit: 2048

  jpa:
    # FIX: use 'update' not 'validate' for first deploy so Hibernate creates missing columns
    # Switch back to 'validate' after the first successful deploy
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

  sql:
    init:
      # 'always' runs schema.sql every startup (IF NOT EXISTS makes it safe)
      mode: always
      # FIX: schema must run before Hibernate validation
      continue-on-error: true

  # ── Redis ─────────────────────────────────────────────────────────────────
  # On Render: add a Redis service and set REDIS_URL env var (Render's format)
  # OR use Upstash Redis (free tier) and set REDIS_URL
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1
          max-wait: 3000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000

  # ── Kafka ─────────────────────────────────────────────────────────────────
  # On Render: use Upstash Kafka (free tier at upstash.com/kafka)
  # Set KAFKA_SERVERS, KAFKA_USERNAME, KAFKA_PASSWORD env vars from Upstash console
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    properties:
      # Upstash Kafka requires SASL/SSL — these activate when KAFKA_USERNAME is set
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS:}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: ${KAFKA_ACKS:1}
      retries: 3
      batch-size: 16384
      linger-ms: 5
      buffer-memory: 33554432
      compression-type: snappy
      properties:
        enable.idempotence: false
    consumer:
      group-id: orbit-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100
      properties:
        spring.json.trusted.packages: "com.jobScheduling.job.*"
        session.timeout.ms: 45000
        heartbeat.interval.ms: 15000
        max.poll.interval.ms: 300000

# ── Async thread pools ────────────────────────────────────────────────────
# FIX: Reduced drastically — Render free tier has 512MB RAM
# 400 threads × ~1MB stack = OOM. Use small pools; virtual threads handle the rest.
async:
  executor:
    core-pool-size: ${ASYNC_CORE_POOL:5}
    max-pool-size: ${ASYNC_MAX_POOL:20}
    queue-capacity: 1000
    thread-name-prefix: "orbit-async-"
    keep-alive-seconds: 30

# ── Server ────────────────────────────────────────────────────────────────
server:
  # FIX: Render assigns PORT dynamically — must bind to 0.0.0.0:$PORT
  port: ${PORT:8080}
  tomcat:
    threads:
      # FIX: 400 threads on 512MB RAM = OOM. Keep small; virtual threads help.
      max: ${TOMCAT_MAX_THREADS:50}
      min-spare: 5
    accept-count: 100
    connection-timeout: 10000
    max-connections: 2000
  compression:
    enabled: true
    mime-types: application/json,text/plain,text/html

# ── Actuator ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      # FIX: Don't fail startup if Kafka is slightly slow to connect
      probes:
        enabled: true
  health:
    kafka:
      enabled: ${KAFKA_HEALTH_ENABLED:true}
  metrics:
    tags:
      application: ${spring.application.name}

# ── Resilience4j ─────────────────────────────────────────────────────────
resilience4j:
  ratelimiter:
    instances:
      jobApi:
        limit-for-period: 500
        limit-refresh-period: 1s
        timeout-duration: 0s
  circuitbreaker:
    instances:
      jobService:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        register-health-indicator: true
  retry:
    instances:
      jobExecution:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - org.springframework.dao.TransientDataAccessException
          - org.springframework.kafka.KafkaException

# ── Kafka topic names ─────────────────────────────────────────────────────
kafka:
  bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
  properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS:}
  topics:
    job-created: orbit.job-created
    job-execution-request: orbit.job-execution-request
    job-execution-result: orbit.job-execution-result
    job-retry: orbit.job-retry
    dead-letter: orbit.job-dead-letter
  consumer:
    concurrency: ${KAFKA_CONSUMER_CONCURRENCY:2}

# ── CORS ─────────────────────────────────────────────────────────────────
app:
  cors:
    # FIX: Set CORS_ORIGINS env var in Render to your frontend URL
    # e.g.  CORS_ORIGINS=https://your-app.onrender.com
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}
