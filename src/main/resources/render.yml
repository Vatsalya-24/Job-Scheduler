# ─────────────────────────────────────────────────────────────────────────────
# render.yaml — Orbit Platform deployment configuration (Confluent Kafka)
# ─────────────────────────────────────────────────────────────────────────────
#
# BEFORE DEPLOYING:
# 1. Create a Confluent Cloud account → https://confluent.cloud
# 2. Create a Kafka cluster
# 3. Create API Key + API Secret
# 4. Copy Bootstrap Server
# 5. In Render Dashboard → Environment → add secret env vars manually
#
# HOW TO DEPLOY:
# 1. Push this repo to GitHub
# 2. Go to Render → New → Blueprint
# 3. Select your GitHub repo
# 4. Render detects this render.yaml automatically
# 5. Add secret env vars in Render dashboard
# 6. Click Deploy
#
# IMPORTANT:
# Do NOT store Kafka secrets inside GitHub.
# Keep sync: false for secret values.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Spring Boot Web Service ──────────────────────────────────────────────
  - type: web
    name: orbit-platform
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    branch: main
    autoDeploy: true

    # Health check endpoint
    healthCheckPath: /actuator/health

    envVars:

      # ── Spring Profile ────────────────────────────────────────────────
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # ── PostgreSQL ────────────────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: orbit-db
          property: connectionString

      # ── Redis ────────────────────────────────────────────────────────
      - key: REDIS_URL
        fromService:
          name: orbit-redis
          type: redis
          property: connectionString

      # ── Kafka (Confluent Cloud) ──────────────────────────────────────
      # Add actual values manually in Render Dashboard → Environment

      - key: KAFKA_SERVERS
        sync: false
        # Example:
        # pkc-xxxxx.ap-south-1.aws.confluent.cloud:9092

      - key: KAFKA_SECURITY_PROTOCOL
        value: SASL_SSL

      - key: KAFKA_SASL_MECHANISM
        value: PLAIN

      - key: KAFKA_SASL_JAAS
        sync: false
        # Format:
        # org.apache.kafka.common.security.plain.PlainLoginModule required
        # username="YOUR_API_KEY"
        # password="YOUR_API_SECRET";

      - key: KAFKA_ACKS
        value: "1"

      - key: KAFKA_HEALTH_ENABLED
        value: "true"

      - key: KAFKA_CONSUMER_CONCURRENCY
        value: "1"

      - key: KAFKA_PARTITIONS
        value: "1"

      # ── Async Thread Pool ────────────────────────────────────────────
      - key: ASYNC_CORE_POOL
        value: "5"

      - key: ASYNC_MAX_POOL
        value: "20"

      # ── Tomcat Threads ───────────────────────────────────────────────
      - key: TOMCAT_MAX_THREADS
        value: "50"

      # ── Database Pool ────────────────────────────────────────────────
      - key: DB_POOL_SIZE
        value: "5"

      # ── Hibernate ────────────────────────────────────────────────────
      # First deploy = update
      # Later change to validate
      - key: DDL_AUTO
        value: update

      # ── CORS ─────────────────────────────────────────────────────────
      - key: CORS_ORIGINS
        value: https://orbit-platform.onrender.com

  # ── Redis Service ───────────────────────────────────────────────────────
  - type: redis
    name: orbit-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:

  # ── PostgreSQL Database ─────────────────────────────────────────────────
  - name: orbit-db
    plan: starter
    databaseName: orbit
    user: orbit_user
    postgresMajorVersion: "16"
    ipAllowList: []